pluginManagement {
    repositories {
        gradlePluginPortal()
        maven {
            url = "https://maven.neoforged.net/releases"
        }
        mavenCentral()
    }
    resolutionStrategy {
        eachPlugin {
            if (requested.id.id == 'net.neoforged.moddev') {
                useModule("net.neoforged:moddev-gradle:${requested.version}")
            }
        }
    }
}
